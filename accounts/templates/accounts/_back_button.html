{% comment %}
  Universal Back Button — Usage:
  {% include 'accounts/_back_button.html' %}              → history.back()
  {% include 'accounts/_back_button.html' with href='/marketplace/' %}  → explicit URL
{% endcomment %}
<div class="back-btn-wrap">
    {% if href %}
        <a href="{{ href }}" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    {% else %}
        <button onclick="history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Back</button>
    {% endif %}
</div>
<style>
.back-btn-wrap{margin-bottom:1.25rem;}
.back-btn{display:inline-flex;align-items:center;gap:.45rem;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff!important;border:none;padding:.5rem 1.15rem;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 4px 12px rgba(124,58,237,.3);font-family:inherit;}
.back-btn:hover{transform:translateX(-3px);box-shadow:0 6px 18px rgba(124,58,237,.45);}
.back-btn i{font-size:.78rem;}
</style>
