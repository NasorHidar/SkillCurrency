services:
  db:
    image: postgres:16-alpine
    container_name: skill_currency_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=skill_currency
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: skill_currency_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: skill_currency_web
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 skill_currency.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=local-docker-development-key-123456789
      - DEBUG=True
      - DATABASE_URL=postgres://postgres:postgres_password@db:5432/skill_currency
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
