name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Optional: In case we want to run Redis for tests, but we default to InMemoryChannelLayer for tests.
      # So we don't strictly need a Redis service.

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django System Checks
      env:
        SECRET_KEY: 'ci-secret-key-for-testing-purposes-only'
        DEBUG: 'True'
        GEMINI_API_KEY: 'dummy-key'
      run: |
        python manage.py check

    - name: Run Migrations
      env:
        SECRET_KEY: 'ci-secret-key-for-testing-purposes-only'
        DEBUG: 'True'
        GEMINI_API_KEY: 'dummy-key'
      run: |
        python manage.py migrate

    - name: Run Tests
      env:
        SECRET_KEY: 'ci-secret-key-for-testing-purposes-only'
        DEBUG: 'True'
        GEMINI_API_KEY: 'dummy-key'
      run: |
        python manage.py test
